<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="renderer" content="webkit">
  <meta name="HandheldFriendly" content="true">
  <meta name="MobileOptimized" content="320">
  <meta name="screen-orientation" content="portrait">
  <meta name="x5-orientation" content="portrait">
  <title>Document</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/regsuc.css">
</head>

<body>
  <div id="app" class="page">
    <div class="container">
      <div class="bg">
        <cong></cong>
        <gift-bag v-for="(item, index) in items" :key="index" :item="item"></gift-bag>
        <d-btn></d-btn>
      </div>
    </div>
  </div>

  <!-- template -->
  <script type="text/x-template" id="cong-tpl">
    <div>
      <div class="cong"></div>
      <div class="cong-text">任意选择大礼包并购买获得权益</div>
      <div class="cong-tips-bg1">
        <div class="cong-tips">购买商品的账号将成为你享受自买省钱权益的账号； 若商品发生取消、退货、则推手权益将被追回。
        </div>
      </div>
    </div>
  </script>
  <script type="text/x-template" id="gift-bag-tpl">
    <div class="giftbag">
      <div class="giftbag-hwr">
        <div class="giftbag-header">
          <div class="ghat">{{item.giftno}}</div>
        </div>
      </div>
      <div class="giftbag-body">
        <h2 class="g-title">{{item.name}}</h2>
        <h3 class="g-price">
          <span>￥</span>{{item.price}}元
        </h3>
        <button class="g-buy-btn">立即购买</button>
        <div class="giftbag-rich" v-html="item.info"></div>
      </div>
    </div>
  </script>
  <script type="text/x-template" id="d-btn-tpl">
    <div>
      <button class="d-app">我想下载app详细了解下》</button>
    </div>
  </script>
  <!-- template -->

  <script src="js/lib/hotcss.js"></script>
  <script src="js/lib/vue-2.5.16.js"></script>
  <script src="js/lib/axios.js"></script>
  <!-- <script src="js/dist/libs.min.js"></script> -->
  <script src="js/regsuc.js"></script>
</body>

</html>
